<?xml version='1.0' encoding='UTF-8' ?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Testergebnisse verwalten</title>
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
</h:head>
<h:body>
    <p:growl id="msgErgebnis" showDetail="true" life="3000" />

    <h1>Require4Testing</h1>
    
    <h:form id="formErgebnis">
    
        <div style="margin-bottom: 20px;">
            <p:menuButton value="Ansicht wechseln" icon="pi pi-bars" styleClass="ui-button-outlined">
                 <p:menuitem value="- Anforderungen (RE)" outcome="anforderungen" />
                <p:menuitem value="- Testfälle (Designer)" outcome="testfaelle"/>
                <p:menuitem value="- Testläufe (Manager)" outcome="testlaeufe"/>
                <p:menuitem value="- Tetergebnis (Tester)" outcome="testergebnisse"/>
            </p:menuButton>
        </div>

        <p:panel header="Tester Auswahl" style="margin-bottom: 20px">
            <h:panelGrid columns="3" cellpadding="5">
                <p:outputLabel value="Tester:" for="testerAuswahl"/>
                
                <p:selectOneMenu id="testerAuswahl" value="#{testergebnisController.ausgewaehlterTesterId}" style="margin-right: 10px">
                    <f:selectItem itemLabel="Bitte wählen..." itemValue="0" noSelectionOption="true"/>
                    <f:selectItems value="#{testergebnisController.alleTester}" var="tester" 
                                   itemLabel="#{tester.name}" itemValue="#{tester.id}"/>
                </p:selectOneMenu>
            
                <p:commandButton value="Aktualisieren" icon="pi pi-refresh" 
                         action="#{testergebnisController.init()}" 
                         update="dtTestergebnisse :msgErgebnis" />
            </h:panelGrid>                    
        </p:panel>

        <p:dataTable id="dtTestergebnisse" var="te" value="#{testergebnisController.zugewieseneTests}"
                     emptyMessage="Bitte wählen Sie oben einen Tester aus oder es sind keine Tests zugewiesen.">
                     
            <f:facet name="header">
                <h2>Testergebnisse verwalten</h2>
            </f:facet>
            
            <p:column headerText="Testlauf">
                <h:outputText value="#{te.testlauf.name}" />
            </p:column>

            <p:column headerText="Testfall">
                <h:outputText value="#{te.testfall.name}" />
            </p:column>

            <p:column headerText="Bestanden" style="text-align: center; width: 120px;">
            	<p:toggleSwitch value="#{te.ergebnis}"/>
            </p:column>
            
        </p:dataTable>
        <p:commandButton value="Speichern" icon="pi pi-check" 
                         action="#{testergebnisController.ergebnisseSpeichern()}" 
                         update="dtTestergebnisse :msgErgebnis" />

    </h:form>
</h:body>
</html>
