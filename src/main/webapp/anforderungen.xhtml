<?xml version='1.0' encoding='UTF-8' ?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Anforderungen</title>
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
</h:head>
<h:body>
    <p:growl id="nachrichten" showDetail="true" life="3000" />

    <h1>Require4Testing</h1>
    <h:form id="form">
    	<div style="margin-bottom: 20px;">
            <p:menuButton value="Ansicht wechseln" icon="pi pi-bars" styleClass="ui-button-outlined">
                <p:menuitem value="- Anforderungen (RE)" outcome="anforderungen" />
                <p:menuitem value="- Testfälle (Designer)" outcome="testfaelle"/>
                <p:menuitem value="- Testläufe (Manager)" outcome="testlaeufe"/>
                <p:menuitem value="- Tetergebnis (Tester)" outcome="testergebnisse"/>
            </p:menuButton>
        </div>
        
        <p:dataTable id="tabelleAnforderungen" var="a" value="#{anforderungController.alleAnforderungen}">
            <f:facet name="header">
                <h2>Anforderungen verwalten</h2>
            </f:facet>
            
            <p:column headerText="Name">
                <p:inputText id="name" value="#{a.name}" required="true" requiredMessage="Name fehlt"/>
            </p:column>

            <p:column style="width: 80px; text-align: center;">
                <p:commandButton icon="pi pi-trash" 
                                 styleClass="ui-button-danger rounded-button"
                                 action="#{anforderungController.anforderungLoeschen(anforderung)}" 
                                 update="tabelleAnforderungen :nachrichten" 
                                 process="@this"
                                 title="Löschen">
                     <p:confirm header="Bestätigung" message="Wirklich löschen?" />
                </p:commandButton>
            </p:column>
            
        </p:dataTable>
        <br/>
        <p:commandButton value="Anforderung hinzufügen" icon="pi pi-plus" 
                         action="#{anforderungController.neueAnforderungHinzufügen()}" 
                         update="tabelleAnforderungen" 
                         process="@this" 
                         style="margin-right: 10px"/>
                         
        <p:commandButton value="Speichern" icon="pi pi-check" 
                         action="#{anforderungController.anforderungenSpeichern()}" 
                         update="tabelleAnforderungen :nachrichten" />
                         
        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
            <p:commandButton value="Nein" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
            <p:commandButton value="Ja" type="button" styleClass="ui-confirmdialog-yes" />
        </p:confirmDialog>
    </h:form>
</h:body>
</html>
